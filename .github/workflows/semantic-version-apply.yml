name: Semantic Version - Apply
on:
  workflow_call:
    inputs:
      project_dir:
        description: 'Directory where the Semantic Release configuration is located'
        type: string
        required: false
      DEBUG:
        description: 'Run the workflow in debug mode'
        type: boolean
        required: false
        default: false
    outputs:
      release_notes:
        description: 'Release notes generated by semantic-release'
        value: ${{ jobs.Apply-Version.outputs.release_notes }}
    secrets:
      sem_rel_token_token:
        required: true

jobs:
  Apply-Version:
    name: Apply Version

    runs-on: ubuntu-latest

    outputs:
      release_notes: ${{ steps.extract_notes.outputs.release_notes }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}
          clean: false
          persist-credentials: false
        env:
          GITHUB_TOKEN: ${{ secrets.sem_rel_token_token }}

      - name: cache NPM
        uses: actions/cache@v5
        id: npm-cache
        with:
          path: |
            **/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Setup Node.js environment
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"

      - name: Set PROJECT_DIR environment variable
        if: ${{ inputs.project_dir != '' }}
        run: echo "PROJECT_DIR=${{ inputs.project_dir }}" >> "$GITHUB_ENV"

      - name: Install Semantic Release
        run: |
          cd ${{ env.PROJECT_DIR || '.' }}
          npm ci

      - name: Apply release
        run: |
          cd ${{ env.PROJECT_DIR || '.' }}
          npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.sem_rel_token_token }}
          GIT_COMMITTER_NAME: "Arc-E-Tect Versioning bot"
          GIT_COMMITTER_EMAIL: "sedr@arc-e-tect.com"
          GIT_AUTHOR_NAME: "Arc-E-Tect Versioning bot"
          GIT_AUTHOR_EMAIL: "sedr@arc-e-tect.com"

      - name: Pull latest changes including CHANGELOG
        run: |
          cd ${{ env.PROJECT_DIR || '.' }}
          git pull https://x-access-token:${{ secrets.sem_rel_token_token }}@github.com/${{ github.repository }}.git ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.sem_rel_token_token }}

      - name: Extract release notes
        id: extract_notes
        uses: ./.github/actions/extract-release-notes
        with:
          project_dir: ${{ env.PROJECT_DIR || '.' }}
          max_length: '1500'